name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v0.1.2"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish Windows release
    runs-on: windows-latest

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ./
          tauriScript: npm run tauri
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "AspectShift-HtoV ${{ env.RELEASE_TAG }}"
          releaseBody: |
            Signed Windows release for AspectShift-HtoV ${{ env.RELEASE_TAG }}.

            This release includes:
            - more stability and bug fixes.

          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
